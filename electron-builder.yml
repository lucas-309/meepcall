appId: ai.meepcall.meepcall
productName: meepcall
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/@recallai/**
extraResources:
  - from: build/bin/audio-helper
    to: bin/audio-helper
  - from: build/bin/whisper-cli
    to: bin/whisper-cli
  - from: build/models/ggml-large-v3-turbo.bin
    to: models/ggml-large-v3-turbo.bin
mac:
  target:
    - dmg
  category: public.app-category.productivity
  hardenedRuntime: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSCameraUsageDescription: meepcall needs camera access to record participant video.
    NSMicrophoneUsageDescription: meepcall needs microphone access to record meeting audio.
    NSScreenCaptureUsageDescription: meepcall needs screen recording access to capture meetings.
    NSAccessibilityUsageDescription: meepcall uses accessibility access to detect meetings.
    NSUserNotificationAlertStyle: alert
dmg:
  artifactName: ${name}-${version}.${ext}
afterPack: build/afterPack.js
npmRebuild: false
